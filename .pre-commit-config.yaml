# Pre-commit hooks for Te Reo Māori Bot
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      # JSON validation and formatting
      - id: check-json
        name: Check JSON syntax
        description: Validates JSON syntax in all .json files
        files: \.(json)$

      - id: pretty-format-json
        name: Format JSON files
        description: Formats JSON files with consistent indentation
        files: \.(json)$
        args: [--autofix, --indent=4]

      # General file checks
      - id: check-yaml
        name: Check YAML syntax
        description: Validates YAML syntax

      - id: end-of-file-fixer
        name: Fix end of files
        description: Ensures files end with a newline

      - id: trailing-whitespace
        name: Trim trailing whitespace
        description: Trims trailing whitespace

      - id: check-merge-conflict
        name: Check for merge conflicts
        description: Checks for merge conflict markers

      - id: check-case-conflict
        name: Check for case conflicts
        description: Checks for files with case conflicts

  # SQLite database validation
  - repo: local
    hooks:
      - id: validate-database
        name: Validate SQLite Database
        description: Validates the structure and integrity of words.db
        entry: bash -c
        args:
          - -c
          - 'sqlite3 data/words.db "SELECT COUNT(*) FROM words WHERE day_index IS NOT NULL;" | grep -q "^366$" && echo "✓ Database valid: 366 words with day_index" || (echo "✗ Database validation failed: Expected 366 words" && exit 1)'
        language: system
        files: ^data/words\.db$
        pass_filenames: false

# Global settings
default_language_version:
  node: system

# Configure which files to include/exclude
files: ^(data/words\.db|\..*\.ya?ml)$
exclude: ^(\.git/|node_modules/|out/|\.vscode/|\.devcontainer/|data/.*\.db-.*)

# Fail fast - stop running hooks after first failure
fail_fast: false

# Minimum pre-commit version
minimum_pre_commit_version: "3.0.0"
